<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Кујна - Најава</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2B2E28">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-stamp">К</div>
    <h1>Кујна Дневник</h1>
    <p class="login-sub">Внеси го твојот ПИН за да продолжиш</p>

    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>

    <div class="pin-error" id="pinError"></div>

    <div class="pin-pad" id="pinPad">
      <button class="pin-key" data-key="1">1</button>
      <button class="pin-key" data-key="2">2</button>
      <button class="pin-key" data-key="3">3</button>
      <button class="pin-key" data-key="4">4</button>
      <button class="pin-key" data-key="5">5</button>
      <button class="pin-key" data-key="6">6</button>
      <button class="pin-key" data-key="7">7</button>
      <button class="pin-key" data-key="8">8</button>
      <button class="pin-key" data-key="9">9</button>
      <button class="pin-key clear" data-action="clear">Бриши</button>
      <button class="pin-key" data-key="0">0</button>
      <button class="pin-key back" data-action="back">⌫</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/session.js"></script>
<script src="js/login.js"></script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}</script>
</body>
</html>
