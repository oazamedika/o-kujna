<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Кујна - Нова ставка</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2B2E28">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-topbar">
  <div class="brand"><span class="stamp-dot"></span> Кујна Дневник</div>
  <div class="who">
    <span id="whoName"></span>
    <a href="view.html" class="link-btn">Стари ставки</a>
    <button class="link-btn" id="logoutBtn">Одјава</button>
  </div>
</div>

<div class="page">

  <div class="field">
    <span class="section-label">Оброк</span>
    <div class="meal-picker" id="mealPicker">
      <button class="meal-chip" data-meal="Појадок">Појадок</button>
      <button class="meal-chip" data-meal="Ужина наутро">Ужина наутро</button>
      <button class="meal-chip" data-meal="Ручек">Ручек</button>
      <button class="meal-chip" data-meal="Ужина попладне">Ужина попладне</button>
      <button class="meal-chip" data-meal="Вечера">Вечера</button>
    </div>
  </div>

  <div class="entry-grid">

    <div class="card">
      <span class="section-label">Состојки</span>
      <div id="ingredientRows"></div>
      <button class="add-ingredient-btn" id="addIngredientBtn">+ Додади состојка</button>
    </div>

    <div>
      <div class="card" style="margin-bottom: 18px;">
        <div class="field" style="margin-bottom: 14px;">
          <label for="entryDate">Датум</label>
          <input type="date" id="entryDate">
        </div>
        <div class="field" style="margin-bottom: 0;">
          <label for="descInput">Опис (пр. Грав со колбаси)</label>
          <textarea id="descInput" placeholder="Краток опис на јадењето..."></textarea>
        </div>
      </div>

      <div class="card">
        <span class="section-label">Служени порции</span>
        <div class="portions-grid">
          <div class="portion-box">
            <label>Корисници</label>
            <input type="number" id="portionsUsers" min="0" inputmode="numeric" value="0">
          </div>
          <div class="portion-box">
            <label>Вработени</label>
            <input type="number" id="portionsEmployees" min="0" inputmode="numeric" value="0">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="submit-bar">
    <button class="btn btn-primary btn-block" id="submitBtn">Зачувај ставка</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/session.js"></script>
<script src="js/entry.js"></script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}</script>
</body>
</html>
